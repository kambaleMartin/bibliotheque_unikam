{% extends "layout.html" %}

{% block content %}
  <section class="card">
    <h2>Connexion</h2>
    <form method="POST" action="/login" class="form-card">
      <label>Nom d'utilisateur<input type="text" name="username" required /></label>
      <label>Mot de passe<input type="password" name="password" required /></label>
      <button type="submit">Se connecter</button>
    </form>
    <p><a href="/reset_password">Mot de passe oublié ?</a></p>
    <p>Pas encore inscrit ? <a href="/register">Créer un compte</a>.</p>
  </section>
{% endblock %}
