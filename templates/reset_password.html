{% extends "layout.html" %}

{% block content %}
  <section class="card">
    <h2>Réinitialiser le mot de passe</h2>
    <form method="POST" action="/reset_password" class="form-card">
      <label>
        <span>Nom d'utilisateur</span>
        <input type="text" name="username" placeholder="Entrez votre nom d'utilisateur" required />
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="nom@exemple.com" required />
      </label>
      <label>
        <span>Nouveau mot de passe</span>
        <input type="password" name="new_password" placeholder="Nouveau mot de passe" required />
      </label>
      <label>
        <span>Confirmer le mot de passe</span>
        <input type="password" name="confirm_password" placeholder="Confirmez le mot de passe" required />
      </label>
      <button type="submit">Réinitialiser</button>
    </form>
    <p>Retour à la <a href="/login">connexion</a>.</p>
  </section>
{% endblock %}
